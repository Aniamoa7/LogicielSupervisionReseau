<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Connexion</title>
  <style>body{font-family:Arial;margin:20px;}form{max-width:400px;}label{display:block;margin:8px 0 4px;}input{width:100%;padding:8px;margin-bottom:10px;}button{padding:10px 15px;} .message{padding:10px;border:1px solid #ccc;margin-bottom:10px;} .success{background:#e6ffe6;border-color:#7cc47c;} .danger{background:#ffe6e6;border-color:#d16767;} .info{background:#eef4ff;border-color:#7c95c4;}</style>
</head>
<body>
  <h1>Connexion</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="message {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="post" action="{{ url_for('login') }}">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
    <label for="mot_de_passe">Mot de passe</label>
    <input type="password" id="mot_de_passe" name="mot_de_passe" required>
    <button type="submit">Se connecter</button>
  </form>
</body>
</html>
